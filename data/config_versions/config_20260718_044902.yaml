# --- Institutional Entry Gate (v5.4) -----------------------------------
# The "should I trade now?" brain. Rejects weak setups BEFORE they reach
# the broker. Outputs BUY / SELL / WAIT / SKIP.
institutional_entry:
  min_rr: 2.0                  # minimum reward:risk ratio
  strong_rr: 3.0               # R:R for full marks
  spread_max_multiple: 2.0     # reject if spread > 2x normal
  atr_low_multiple: 0.3        # reject if ATR < 0.3x baseline (dead market)
  atr_high_multiple: 3.0       # reject if ATR > 3x baseline (chaotic market)
  news_blackout_minutes: 15    # no trade within ±15 min of high-impact news
  range_middle_skip_pct: 0.30  # skip if price in middle 30% of range AND ranging
  low_liquidity_sessions: ["sydney", "off"]
  atr_period: 14
  ema_fast: 20
  ema_slow: 50
  adx_period: 14
  adx_trend_threshold: 18.0
  volume_period: 20
  volume_min_ratio: 1.5
  key_level_atr_multiple: 0.5  # price within 0.5 ATR of a swing/PDH/PDL = key level
  swing_lookback: 20
  range_lookback: 50
  # Score thresholds (0-100)
  threshold_strong: 85.0       # A+ setup
  threshold_acceptable: 70.0   # take the trade
  threshold_weak: 55.0         # WEAK — flag but skip by default


# =========================================================================
#  Trading Bot — Global Configuration
#  This single file drives the entire pipeline (risk, symbols, strategy,
#  execution, monitoring). Day-7 production hardening reads from here.
# =========================================================================

# =========================================================================
#  MT5 Connection (PRIMARY BROKER) — Deriv Demo
# =========================================================================
#  How to get Deriv MT5 demo credentials:
#    1. Register a free account at https://deriv.com
#    2. Dashboard → MT5 → "+ Add or register a demo account"
#    3. Choose "Deriv MT5 Demo" (server: Deriv-Demo)
#    4. Copy the login (10-digit number) and password from the dashboard
#    5. Also install MetaTrader 5 terminal from https://www.metatrader5.com/
#       and log in once with the same credentials so the terminal caches
#       the server certificate.
#  6. Paste your credentials below — keep this file private.
# =========================================================================
mt5:
  login: 32311586             # Deriv MT5 demo login
  # Phase 13: password loaded from MT5_PASSWORD env var (config_loader.py)
  # Set it with: export MT5_PASSWORD="your_password"
  # NEVER commit real passwords to config.yaml.
  password: ""                # left empty — config_loader falls back to env var
  server: "Deriv-Demo"        # Deriv MT5 demo server
  terminal_path: "C:\\Program Files\\MetaTrader 5 Terminal\\terminal64.exe"
  timeout_ms: 5000
  reconnect_attempts: 5
  reconnect_delay_s: 2
  # PERF FIX: fetch_candles(symbol, "M15", 500) was being re-fetched in
  # full over MT5 IPC for every symbol on EVERY cycle (every poll_interval_s
  # = 5s), even though M15 bars only close every 900s. Measured: ~325ms
  # per call x 100 symbols, serialized = the ~32s cycle time you saw.
  # Now cached per (symbol, timeframe, count) for this many seconds —
  # cycle 1 (cold cache) still pays the full IPC cost, but subsequent
  # cycles within the TTL reuse the cached data and should be dramatically
  # faster. The in-progress (still-forming) last bar can be up to this
  # many seconds stale. Set to 0 to disable caching (always fetch fresh).
  candle_cache_ttl_s: 60

# --- CoinMarketCap API (used by paper-trading engine + price fallback) ---
# P0 SECURITY FIX (Co-Founder Audit): the previous hardcoded key
#   "REDACTED_LEAKED_KEY_ROTATE_AT_CMC_PORTAL"
# was committed in plaintext and propagated to 75+ historical config
# snapshots in data/config_versions/. That key MUST be rotated at
# https://pro.coinmarketcap.com/account/ — assume it is compromised.
# The new key is loaded from the CMC_API_KEY environment variable via the
# !ENV tag (config_loader.py:62). Set it in .env:
#     CMC_API_KEY=your_rotated_key_here
cmc_api_key: !ENV CMC_API_KEY, optional

# --- cTrader connection (DEPRECATED — kept for future use) ---
# Register at https://openapi.ctrader.com/ if you want to switch later.
ctrader:
  client_id: ""
  client_secret: ""
  access_token: ""
  account_id: ""
  host: "demo.ctrader.com"
  port: 5036

# --- Symbols & timeframes ----------------------------------------------

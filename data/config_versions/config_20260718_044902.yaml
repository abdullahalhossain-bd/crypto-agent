# --- Universe pre-filter (Co-Founder Audit — production hardening) -------
# Before AI agents run, the bot pre-screens symbols to drop ones that would
# obviously fail liquidity/spread/volatility gates. This saves CPU (feature
# engineering + 5 AI agents) and stops per-symbol REJECTED logs from
# flooding the console. The top N most-tradable symbols proceed to AI.
universe_filter:
  enabled: true              # set false to process ALL symbols (legacy behavior)
  max_size: 20               # how many survivors go to AI analysis
  max_spread_bps: 15.0       # reject symbols with wider spread than this
  min_volume_pctile: 0.20    # floor = 20th pctile of last 20 bars × 0.5
  drop_variant_suffixes: true   # drop AUDNZDmicro if AUDNZD exists
  variant_suffixes:             # what counts as a "variant" suffix
    - "micro"
    - "mini"
    - ".conv"
    - "c"
    - "pro"

# --- LLM augmentation (Co-Founder Audit — agents/ pipeline integration) -
# When enabled, the rule-based MultiAgentCoordinator runs FIRST (fast,
# deterministic, zero-cost). If it produces an actionable BUY/SELL signal
# AND LLM is available AND cost budget remains, the LLM graph (agents/)
# runs as a SECOND OPINION on that symbol only. LLM never runs on HOLDs.
#
# On ANY LLM failure (timeout, all-providers-down, cost cap exhausted),
# the rule-based consensus is returned unchanged. The bot NEVER blocks
# on LLM. LLM is advisory — disagreement does not override rule-based,
# but downgrades strength so the risk pipeline can reject.
#
# To enable: set GROQ_API_KEY (or CEREBRAS/SAMBANOVA/OPENROUTER/GEMINI)
# in .env, then set `enabled: true` here. Cost caps prevent runaway spend.
llm:
  enabled: false                       # opt-in — default off for safety
  cost_budget_per_cycle_usd: 0.02      # ~4 LLM calls/cycle at $0.005 each
  cost_budget_per_day_usd: 5.00        # hard daily cap
  latency_budget_s: 8.0                # per-symbol LLM timeout
  min_rule_strength: 0.15              # only run LLM if rule-based >= this
  boost_multiplier: 1.3                # strength boost when LLM agrees (cap 1.5)
  veto_multiplier: 0.5                 # strength reduction when LLM disagrees
  estimated_cost_per_call_usd: 0.005   # rough estimate for budget tracking
  require_llm_for_live: false          # if true, live mode refuses to trade without LLM

# --- News + macro + economic calendar (feeds LLM NewsAnalyst) -----------
# When LLM augmentation is enabled, these providers populate the
# news_items / macro / upcoming_events context fields that NewsAnalyst
# reads. All sources are optional — set the ones you have keys for.
# Without any keys, the fields are empty and NewsAnalyst degrades to
# "no recent news available" (still works, just less informed).
#
# Sources (all have free tiers):
#   FRED_API_KEY       — Federal Reserve macro data (CPI, rates, GDP, VIX)
#   NEWSAPI_KEY        — NewsAPI.org financial news (100 req/day free)
#   TRADINGECONOMICS_KEY — Economic calendar (high-impact events)
#   TRADERMADE_KEY     — Alternative economic calendar
news:
  enabled: true                # toggle the whole news subsystem
  macro_enabled: true          # FRED macro indicators
  events_enabled: true         # economic calendar
  cache_ttl_s: 600             # news headlines cache (10 min)
  macro_cache_ttl_s: 3600      # macro data cache (1 hour — updates daily)
  events_cache_ttl_s: 1800     # events cache (30 min)
  max_headlines: 10            # max articles per fetch
  query: "crypto OR bitcoin OR forex"  # NewsAPI query

# --- Retail sentiment (feeds LLM SentimentAnalyst) ----------------------
# When LLM augmentation is enabled, this populates the retail_sentiment
# context field (long/short positioning + contrarian signal).
# Without any keys, falls back to synthetic neutral (50/50).
#
# Sources:
#   MYFXBOOK_EMAIL + MYFXBOOK_PASSWORD — Myfxbook Community Outlook (free)
#   OANDA_API_KEY + OANDA_ACCOUNT_ID   — OANDA v20 position book
sentiment:
  enabled: true                # toggle the sentiment subsystem
  cache_ttl_s: 300             # per-symbol sentiment cache (5 min)

# --- Risk management ----------------------------------------------------
risk:
  # ── FORENSIC AUDIT FIX: WisdomGate score scale alignment ──────────────
  # The multi-agent coordinator produces strength on a 0.06–0.42 scale
  # (sum of confidence × target_weight, where weights are 0.08–0.15).
  # WisdomGate's Principle 6 checks confidence >= min_confidence.
  # The old default of 0.60 was IMPOSSIBLE to reach → bot never traded.
  # 0.12 is below the typical actionable range (0.15–0.30), so genuine
  # signals pass while noise (strength < 0.12) is still filtered.
  min_confidence: 0.12
  # ATR-based SL/TP gives R:R of ~1.5–2.5 depending on volatility.
  # The old default of 2.0 rejected many valid setups. 1.5 is more
  # realistic for the ATR multiple defaults (SL=1.5×ATR, TP=2.5×ATR).
  min_rr: 1.5
  # Fraction of equity risked per trade (0.01 = 1%)
  risk_per_trade: 0.01
  # Hard stop for the day (0.05 = 5% equity drawdown -> halt)
  max_daily_loss: 0.05
  # Max concurrent open positions across all symbols
  max_open_trades: 10
  # Reject signals when current ATR-based volatility exceeds this multiple of baseline
  volatility_filter_multiple: 2.5
  # ATR lookback (in bars) used to measure volatility
  atr_period: 14
  # Mandatory stop-loss distance, expressed in ATR multiples
  stop_atr_multiple: 1.5
  take_atr_multiple: 2.5
  # If true, refuse to open new trades on weekends for crypto symbols
  block_weekends: false
  # --- Risk Engine v2 (Day 14-16) ---
  v2:
    var_confidence: 0.95            # 95% 1-day VaR
    var_lookback: 250               # bars used for vol estimation
    max_var_pct: 0.04               # reject if portfolio VaR > 4%
    max_drawdown_pct: 0.15          # halt if rolling DD > 15%
    vol_scale_high: 1.5             # ATR > 1.5x baseline → scale down
    vol_scale_zero: 3.0             # ATR > 3x baseline → reject
    correlation_penalty_threshold: 0.7
    max_lot_per_trade: 5.0

# --- Execution -----------------------------------------------------------
# P0-10 FIX (Phase 3): the `mode` field at the top level + CLI --mode flag
# replaces the dead `execution.send_real_orders` key. Default is paper.
# CLI: python main.py --mode=paper|demo|live
# (live requires --i-understand-this-is-real-money)
mode: demo                # demo (default) | live (requires --i-understand-this-is-real-money)
execution:
  # deviation_slippage: max slippage in points tolerated on market orders
  deviation_slippage: 20
  # order_timeout_s: hard timeout for a single order_send round-trip
  order_timeout_s: 10
  # cooldown_s: minimum seconds between consecutive orders on the same symbol
  # (prevents rapid-fire duplicate signals; the risk pipeline also enforces this)
  cooldown_s: 60

# --- Backtest ------------------------------------------------------------
backtest:
  initial_capital: 10000.0
  commission_per_trade: 0.0002     # 2 bps
  slippage_points: 2
  # Use bar close (realistic) or bar open (no lookahead) for fill price
  fill_price: close

# --- Logging -------------------------------------------------------------
logging:
  level: INFO              # DEBUG | INFO | WARNING | ERROR
  system_log: logs/system.log
  trade_log: logs/trades.log
  json_logs: false          # set true for structured JSON lines
  rotate_mb: 10
  backup_count: 5

# --- Main loop / scheduler ----------------------------------------------
runtime:
  poll_interval_s: 5        # how often the main loop wakes up
  # Heartbeat — if no successful cycle for this many seconds, watchdog fires
  heartbeat_timeout_s: 60
  # Path of the kill-switch file. If this file exists, the bot halts.
  kill_switch_file: data/KILL_SWITCH
  # Crash recovery: persist state here so a restart can resume
  state_file: data/state.json
  # Maximum number of consecutive errors before the bot self-halts
  max_consecutive_errors: 10
  # PERF: caps how many auto-loaded symbols the bot tracks (was hardcoded
  # to 100 in integration.py). Each symbol costs ~1 MT5 IPC round-trip
  # per cycle in fetch_candles(), and the MetaTrader5 IPC channel is
  # effectively serialized (see MT5Adapter._ipc_lock) — so cycle time
  # scales roughly linearly with symbol count. 100 symbols is what
  # produced ~35s cycles against a 30s alert threshold. Lower this
  # (e.g. 30-40) if you want faster, more responsive cycles; raise the
  # alert threshold below instead if you'd rather keep full coverage.
  max_symbols: 100
  # Cycle time above which a WARNING alert fires. With 100 symbols and
  # serialized MT5 IPC, ~35s cycles are expected — raise this if you keep
  # max_symbols at 100, or lower max_symbols instead and keep this at 30s.
  cycle_time_alert_ms: 30000
  # UI: idle/regime-blocked cycles (nothing scanned) are collapsed into a
  # periodic heartbeat instead of one log line each — this many idle
  # cycles between heartbeat lines. Active scan cycles always log
  # immediately regardless of this setting.
  idle_heartbeat_cycles: 12
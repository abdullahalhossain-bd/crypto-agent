data:
  lookback_candles: 1000
  # Timezone the bot assumes MT5 server is in (UTC by default on most brokers)
  server_timezone: UTC

# --- Strategy parameters -------------------------------------------------
strategy:
  type: momentum           # v6.3: momentum (more signals) | sma_crossover | rsi_reversion
  ema_fast: 9
  ema_slow: 21
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  momentum_lookback: 5
  volume_period: 20
  min_factors: 3           # 3 of 4 factors must agree (lower = more signals)
  # SMA crossover params (used if type: sma_crossover)
  sma_fast: 20
  sma_slow: 50
  use_rsi_filter: true
  min_strength: 0.08          # FIX: strength scale is 0.06-0.42, allow 1-agent signals too

# --- Strategy Pool (Day 8-10) — multi-strategy engine -------------------
strategy_pool:
  # If non-empty, the runner uses these instead of the single `strategy:` block.
  # Each entry maps a strategy name (from the registry) to its params.
  enabled:
    - name: sma_crossover
      params: { sma_fast: 20, sma_slow: 50, use_rsi_filter: true, min_strength: 0.4 }
    - name: donchian_breakout
      params: { window: 20, min_strength: 0.0 }
    - name: mean_reversion
      params: { bb_period: 20, bb_std: 2.0, rsi_period: 14 }
  # Run strategies in parallel (threading)
  parallel: false

# --- Portfolio Engine (Day 11-13) ---------------------------------------
portfolio:
  max_gross_exposure: 2.0           # in risk units (fraction of equity)
  max_net_exposure: 1.0
  correlation_threshold: 0.7        # penalise symbols whose |corr| exceeds this
  correlation_lookback: 500

# --- ML Filter Layer (Day 20-22) ----------------------------------------
ml:
  enabled: true
  backend: lightgbm                 # lightgbm | xgboost | logistic
  model_path: data/ml_model.pkl
  min_confidence: 0.55              # veto signals below this
  max_confidence: 0.95              # cap (avoid overconfidence)
  # Walk-forward training
  train:
    n_folds: 5
    train_ratio: 0.7
    forward_horizon: 5
    forward_threshold: 0.001        # 10 bps

# --- Regime + Adaptive Allocation (Day 23-25) ---------------------------
regime:
  atr_period: 14
  baseline_period: 50
  trend_window: 20
  high_vol_threshold: 1.5
  calm_threshold: 0.7
  trend_strength_threshold: 0.6
  allocator:
    min_regime_confidence: 0.3
    min_multiplier: 0.1
    high_vol_global_factor: 0.5


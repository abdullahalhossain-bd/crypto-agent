  - "ETH"
  - "XRP"
  - "LTC"
  - "SOL"
  - "BNB"
  - "DOGE"
  - "ADA"
  - "DOT"
  - "AVAX"
  - "EUR"
  - "GBP"
  - "USD"
  - "JPY"
  - "AUD"

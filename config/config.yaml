# =============================================================================
# INSTITUTIONAL TRADING SYSTEM CONFIGURATION
# =============================================================================
# This is the canonical configuration file for the trading system.
# Copy this file and customize for your environment.
# NEVER commit real credentials - use environment variables for secrets.
# =============================================================================

# -----------------------------------------------------------------------------
# OPERATING MODE
# -----------------------------------------------------------------------------
# Valid modes: 'demo', 'live'
# - demo: Paper trading with real market data, no real money
# - live: Real capital at risk (requires MT5_PASSWORD env var)
mode: demo

# Starting capital for performance tracking
capital: 10000.0

# Symbols to trade (auto-load from broker if symbols_auto_load=true)
symbols:
  - "EURUSD"
  - "GBPUSD"
  - "USDJPY"
  - "BTCUSD"
  - "ETHUSD"

# Auto-discover symbols from broker MarketWatch
symbols_auto_load: true

# -----------------------------------------------------------------------------
# METATRADER 5 CONNECTION
# -----------------------------------------------------------------------------
# SECURITY: password should be set via MT5_PASSWORD environment variable
# Use !ENV tag to reference environment variables
mt5:
  login: 12345678                    # Your MT5 account number
  password: !ENV MT5_PASSWORD        # Required: set via environment variable
  server: "MetaQuotes-Demo"          # Broker server name
  terminal_path: ""                  # Optional: path to terminal64.exe
  timeout_ms: 5000                   # Connection timeout
  reconnect_attempts: 5              # Reconnection attempts on failure
  reconnect_delay_s: 2.0             # Delay between reconnection attempts

# -----------------------------------------------------------------------------
# RISK MANAGEMENT
# -----------------------------------------------------------------------------
# These parameters control the 12-gate risk pipeline
risk:
  # Base risk per trade (0.01 = 1% of equity)
  # Range: (0, 0.10] - never risk more than 10% per trade
  risk_per_trade: 0.01
  
  # Maximum daily loss before hard halt (0.05 = 5%)
  # Range: (0, 0.50] - circuit breaker at 50% max
  max_daily_loss: 0.05
  
  # Maximum concurrent open positions
  max_open_trades: 10
  
  # Pause after N consecutive losses
  max_consecutive_losses: 3
  
  # Minimum seconds between trades on same symbol
  cooldown_s: 60.0
  
  # Maximum portfolio drawdown before halt (15%)
  max_drawdown_pct: 15.0
  
  # Reject if ATR% exceeds this threshold (5% of price)
  max_atr_pct: 0.05
  
  # Reject if spread exceeds this (15 basis points)
  max_spread_bps: 15.0
  
  # Kelly fraction for dynamic sizing (0.25 = 25% Kelly)
  kelly_fraction: 0.25
  
  # Stop-loss distance in ATR multiples
  sl_atr_multiple: 1.5
  
  # Take-profit distance in ATR multiples
  tp_atr_multiple: 2.5
  
  # Maximum correlation allowed with existing positions
  max_correlation: 0.85
  
  # Blocked market regimes (trading halted in these conditions)
  blocked_regimes:
    - "crisis"
    - "transition"
    - "chop"
    - "unknown"
  
  # Liquidity gate auto-calibration (use symbol's own volume history)
  liquidity_auto_calibrate: true

# -----------------------------------------------------------------------------
# RUNTIME SETTINGS
# -----------------------------------------------------------------------------
runtime:
  # Polling interval for main loop (seconds)
  poll_interval_s: 5.0
  
  # Heartbeat timeout for health monitoring
  heartbeat_timeout_s: 60.0
  
  # Kill switch file path (create to halt trading)
  kill_switch_file: "data/KILL_SWITCH"
  
  # State persistence file
  state_file: "data/state.json"
  
  # Maximum consecutive errors before emergency halt
  max_consecutive_errors: 10
  
  # Idempotency tracking for order deduplication
  idempotency_file: "data/seen_orders.json"
  
  # Heartbeat file for external monitoring
  heartbeat_file: "data/heartbeat"
  
  # Cycle timeout (max time per trading cycle)
  cycle_timeout_s: 90.0
  
  # Graceful shutdown timeout
  shutdown_timeout_s: 30.0

# -----------------------------------------------------------------------------
# STRATEGY PARAMETERS
# -----------------------------------------------------------------------------
strategy:
  # Primary timeframe for signals
  primary_timeframe: "M15"
  
  # Multi-timeframe analysis enabled
  mtf_enabled: true
  mtf_timeframes:
    - "H1"
    - "H4"
    - "D1"
  
  # Indicator parameters
  indicators:
    atr_period: 14
    rsi_period: 14
    ema_fast: 9
    ema_slow: 21
    
# -----------------------------------------------------------------------------
# AI/ML SETTINGS
# -----------------------------------------------------------------------------
ai:
  # Enable LLM-based signal enhancement
  llm_enabled: false
  
  # Confidence threshold for AI predictions (0.0-1.0)
  min_confidence: 0.65
  
  # Enable Bayesian uncertainty quantification
  bayesian_enabled: true
  
  # Conformal prediction coverage (0.90 = 90% confidence intervals)
  conformal_alpha: 0.10

# -----------------------------------------------------------------------------
# DATA VALIDATION
# -----------------------------------------------------------------------------
data:
  # Require minimum bars for indicator calculation
  min_bars_required: 100
  
  # Maximum age of data before considered stale (seconds)
  max_data_age_s: 300
  
  # Validate OHLCV consistency
  validate_ohlcv: true

# -----------------------------------------------------------------------------
# EXECUTION SETTINGS
# -----------------------------------------------------------------------------
execution:
  # Execution mode: 'simulation', 'paper', 'live'
  execution_mode: paper
  
  # Enable order slicing for large orders
  enable_slicing: true
  
  # Maximum acceptable slippage (basis points)
  max_slippage_bps: 10
  
  # Adaptive execution speed based on volatility
  adaptive_speed: true

# -----------------------------------------------------------------------------
# LOGGING & MONITORING
# -----------------------------------------------------------------------------
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO
  
  # Log to file
  file_enabled: true
  file_path: "logs/trading.log"
  
  # Log rotation (MB)
  max_size_mb: 100
  
  # Keep N backup files
  backup_count: 5
  
  # Include timestamps in logs
  timestamps: true

# -----------------------------------------------------------------------------
# DASHBOARD SETTINGS
# -----------------------------------------------------------------------------
dashboard:
  # Enable web dashboard
  enabled: true
  
  # Dashboard port
  port: 8050
  
  # Refresh interval (seconds)
  refresh_interval_s: 5.0
